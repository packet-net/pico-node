# Cargo config for the RP2040 firmware crate — the load-bearing file for the
# hands-free dev loop (research note §2.5 / §3.2). `cargo run` here flashes over
# SWD and streams defmt/RTT logs.
#
# This lives under the firmware crate (not the workspace root) on purpose: it sets
# a default `target`, which must NOT apply to the host-testable core crate (that
# would make `cargo test` cross-compile and fail). Because ax25-node-fw is a
# standalone, workspace-excluded crate, this config only affects firmware builds.

[build]
# RP2040 = Cortex-M0+ = thumbv6m-none-eabi. No FPU (eabi, not eabihf).
target = "thumbv6m-none-eabi"

[target.thumbv6m-none-eabi]
# `cargo run` → probe-rs flashes the ELF over SWD, resets, attaches, and streams
# defmt/RTT logs to the terminal, exiting with the program's status. No BOOTSEL,
# no drag-drop, no human. Requires a CMSIS-DAP probe (the official Raspberry Pi
# Debug Probe, or a 2nd Pico flashed as `debugprobe`).
runner = "probe-rs run --chip RP2040"
rustflags = [
  # cortex-m-rt + defmt linker scripts, and --nmagic to avoid page-aligning
  # sections (saves flash on the M0+).
  "-C", "link-arg=--nmagic",
  "-C", "link-arg=-Tlink.x",
  "-C", "link-arg=-Tdefmt.x",
  # flip-link: relocates the stack below .bss/.data so a stack overflow faults
  # cleanly instead of silently corrupting statics. Zero runtime cost.
  # (Requires the flip-link linker on PATH — see docs/PLAN.md approval list.)
  "-C", "linker=flip-link",
]

[env]
# defmt log level filter, read at compile time by the defmt macros. Our crate at
# debug; dependencies (cyw43 is extremely chatty at debug — it hexdumps the whole
# CLM blob) at info.
DEFMT_LOG = "info,ax25_node_fw=debug"
# RTT ring buffer size (defmt-rtt reads this at compile time). Sized big enough
# to hold the whole boot→join→DHCP log backlog in RAM, which makes post-hoc log
# reads possible: flash + reset detached, `probe-rs attach` later, and the full
# boot history is still in the buffer. (Bring-up workflow from Gate 2 — useful
# whenever a debug session wasn't attached at the interesting moment.)
DEFMT_RTT_BUFFER_SIZE = "16384"
