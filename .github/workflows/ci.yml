name: ci

# CI for both crates:
#  - check: ax25-node-core (clippy + host tests + the no_std build shape).
#  - fw-build: ax25-node-fw cross-compiled for thumbv6m-none-eabi — gates that
#    the firmware binary AND the embedded-test ELF still link (no hardware
#    needed; flashing/running them is the bring-up rig's job, not CI's). The fw
#    crate is workspace-excluded, so it builds from its own directory, which
#    also activates its .cargo/config.toml (default target, flip-link, defmt
#    linker scripts). WiFi creds are deliberately absent in CI: option_env!
#    builds clean without them and the binary fails loudly at boot instead
#    (HW-BRINGUP §5).
#
# Pinned to the toolchain the suite was last green on (rustc 1.93.1) for
# reproducible runs; bump deliberately.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: clippy · test · no_std
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4

      # ax25-node-core consumes the SDL state machine (m0lte/ax25sdl, the
      # spec/rust crate) as a LOCAL PATH dependency — `../../../ax25sdl/spec/rust`,
      # a sibling checkout (kept a path dep deliberately, co-developed, no crates.io
      # pin). Provide that sibling: it resolves to $GITHUB_WORKSPACE/../ax25sdl
      # (a level up from this repo's checkout). ax25sdl is public, so this needs no
      # token. Tracks ax25sdl main, matching local dev. The rm -rf makes it
      # idempotent across the self-hosted runner's persistent _work tree (the dir
      # lives outside the checkout, so actions/checkout does not clean it).
      - name: Check out the ax25sdl sibling (path dependency)
        run: |
          rm -rf "${GITHUB_WORKSPACE}/../ax25sdl"
          git clone --depth 1 https://github.com/m0lte/ax25sdl.git "${GITHUB_WORKSPACE}/../ax25sdl"

      - name: Install Rust 1.93.1 (+ clippy)
        uses: dtolnay/rust-toolchain@1.93.1
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Clippy (warnings are errors)
        run: cargo clippy -p ax25-node-core --all-targets -- -D warnings

      - name: Test
        run: cargo test -p ax25-node-core

      - name: no_std build (firmware crate's library shape — default features off, alloc on)
        run: cargo build -p ax25-node-core --no-default-features --features alloc

  fw-build:
    name: firmware · thumbv6m link
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4

      # Guard the frozen A/B flash layout: the bootloader and app memory.x must
      # agree, or the swap bricks + OTA deltas break (docs/OTA.md, OTA-RADIO.md).
      # Toolchain-free, so it runs first and fails fast.
      - name: Flash-layout drift check (bootloader vs app)
        run: ./scripts/check-layout.sh

      # Same sibling-clone dance as the check job (fw → core → ax25sdl).
      - name: Check out the ax25sdl sibling (path dependency)
        run: |
          rm -rf "${GITHUB_WORKSPACE}/../ax25sdl"
          git clone --depth 1 https://github.com/m0lte/ax25sdl.git "${GITHUB_WORKSPACE}/../ax25sdl"

      - name: Install Rust 1.93.1 (+ thumbv6m target)
        uses: dtolnay/rust-toolchain@1.93.1
        with:
          targets: thumbv6m-none-eabi

      # flip-link is the linker the fw .cargo/config.toml names; install once
      # per runner (no-op when already present in the persistent ~/.cargo/bin).
      - name: Ensure flip-link
        run: command -v flip-link >/dev/null || cargo install flip-link --locked

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/ax25-node-fw

      - name: Build the firmware binary (release, locked)
        working-directory: crates/ax25-node-fw
        run: cargo build --release --locked

      - name: Build the on-target test ELF (embedded-test; link only, no probe)
        working-directory: crates/ax25-node-fw
        run: cargo test --release --locked --no-run

      # The OTA bootloader (crates/ax25-node-bootloader) is its own standalone
      # thumbv6m crate (embassy-boot-rp). Build it here so the A/B layout +
      # linker glue can't bitrot. No ax25sdl sibling needed (it doesn't depend
      # on core). See docs/OTA.md.
      - name: Build the OTA bootloader (release, locked)
        working-directory: crates/ax25-node-bootloader
        run: cargo build --release --locked
