# parity-manifest.toml — pico-node's declared position in the three-stack parity
# contract (C# Packet.* authoritative <-> TS @packet-net/ax25 <-> Rust pico-node).
#
# Every codec / behaviour "vector set" is EITHER opted-in (the shared golden-vector
# corpus runs and CI fails on any byte mismatch) OR declared-out with a reason — so
# a gap is always a reviewed decision, never a silent hole. This is the pico-node
# analogue of ax25-ts's scripts/parity-exceptions.json.
#
# Consumers:
#   1. crates/ax25-node-core/tests/golden_vectors.rs — the Rust vector runner reads
#      the opted-in set list to know which corpus files under vectors/ to require.
#   2. a future manifest-vs-corpus parity-guard job (the pico-node analogue of the
#      ax25-ts `parity` job): asserts every `in = true` set has a corpus file and
#      every corpus file is either opted-in or declared-out.

schema    = 1
stack     = "pico-node"
reference = "packet-net/packet.net"   # C# Packet.* is the reference runtime

[sdl]
# pico-node's Rust `sdl/` module consumes the generated typed tables from the
# ax25sdl Rust crate (spec/rust). The pin is recorded here AND in ci.yml — bump
# both together to advance the SDL.
#
# Versioning note (this tripped an earlier "0.8.0 vs 0.10.0 skew" report —
# corrected here; the two numbers are different schemes, not a lag):
#   * ax25sdl carries THREE independent version schemes that are NOT comparable:
#     the Rust crate's Cargo.toml version, the git tags (v0.x.y), and the C#
#     `Packet.Ax25.Sdl` NuGet version. Git tag v0.10.0 (= C# NuGet 0.10.0) ships
#     Rust crate 0.7.0; the no_std Rust backend + typed closed sets only landed on
#     `main` afterwards (ADR-0003, commit 6bfe59d, Rust crate → 0.8.0). So the
#     v0.10.0 tag cannot even satisfy this path dependency.
#   * The commits `main` is ahead of v0.10.0 are tooling/codegen/distribution
#     (Rust backend, licence, SVG renders, Scriban bump, SDL-source→submodule) —
#     NOT SDL state-machine changes. pico-node (on `main`) is therefore
#     behaviourally SDL-aligned with C#'s 0.10.0; there is no session-behaviour skew.
# pico-node was already on the latest SDL source; the only real fix was to stop
# floating `main` (silent-drift risk) and pin a reproducible commit.
crate        = "ax25sdl"
repo         = "packet-net/ax25sdl"   # formerly m0lte/ax25sdl (GitHub org-rename redirect)
rust_crate   = "0.8.0"                # the Rust crate version this pin provides (main; no_std backend)
csharp_nuget = "0.10.0"               # what C# pins — git tag v0.10.0; behaviourally aligned (delta is tooling)
pin          = "14ad468a80635a6a574962fc60eed469e6cc975c"  # reproducible latest; MUST match ci.yml

# ---------------------------------------------------------------------------
# opted-IN: pico-node runs the shared corpus for these; CI fails on any mismatch.
# `capabilities` carries negotiate-down degradations as first-class entries so a
# future corpus can tag a vector with a required capability and the runner can
# skip-with-note any vector whose capability the manifest doesn't claim.
# ---------------------------------------------------------------------------

[vector_sets.ax25_mod8]
in           = true
capabilities = ["mod8"]

[vector_sets.ax25_mod128]
in           = true
capabilities = ["mod128", "negotiate-down-from-mod128"]

[vector_sets.kiss]
in           = true
capabilities = ["kiss"]

[vector_sets.axudp]
in           = true
capabilities = ["axudp"]

[vector_sets.netrom_quality]
in           = true
capabilities = ["netrom-quality"]   # FNV-1a flow-hash + quality formula (a*b+128)/256

[vector_sets.netrom_nodes]
in           = true
capabilities = ["netrom-nodes"]

[vector_sets.netrom_l4]
in           = true
capabilities = ["netrom-l4"]

[vector_sets.srej]
in           = true
capabilities = ["srej", "negotiate-down-from-srej"]

[vector_sets.xid]
in           = true
capabilities = ["xid"]

# ---------------------------------------------------------------------------
# DECLARED-OUT / deferred: a missing runner here is a reviewed decision, not a
# hole. The parity guard treats these as intentionally-absent, so they can never
# cause a false CI failure for a corpus file pico-node does not yet run.
# ---------------------------------------------------------------------------

[vector_sets.sdm_telegram]
in     = false
reason = "SDM telegram codec in progress; runner lands with the feature"

[vector_sets.agwpe]
in     = false
reason = "AGWPE not implemented on pico-node"

[vector_sets.rhpv2]
in     = false
reason = "RHPv2 server is node-host-only; out of embedded scope"

[vector_sets.mqtt]
in     = false
reason = "MQTT emission is node-host telemetry, not an on-air codec"

[vector_sets.aprs]
in     = false
reason = "APRS parse/build not ported to pico-node"

[vector_sets.headend]
in     = false
reason = "split-station head-end is a separate daemon; no pico-node codec"
